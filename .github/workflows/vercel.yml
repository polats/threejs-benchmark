name: Deploy Playground to Vercel

# Deploys the standalone browser playground (the benchmarks/demos with a mock
# /api) to Vercel. This is NOT the Reddit app — that deploys to Devvit via
# deploy.yml. Use this for a public, shareable URL you can open without Reddit.
#
# Build: `npm run build:web` -> dist-web/ (static). The /api/* mock ships as
# Vercel serverless functions in /api.

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: vercel-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (vercel build runs `npm run build:web` + /api functions)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt output
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

# ─────────────────────────────────────────────────────────────────────────────
# One-time setup: needs three repo secrets (a Vercel token, not your GitHub PAT).
#   1. Token:  https://vercel.com/account/tokens  -> VERCEL_TOKEN
#   2. Link once:  npx vercel link   then read .vercel/project.json
#   3. gh secret set VERCEL_TOKEN ; gh secret set VERCEL_ORG_ID --body <orgId> ;
#      gh secret set VERCEL_PROJECT_ID --body <projectId>
# Or import the repo at vercel.com/new and delete this workflow.
# ─────────────────────────────────────────────────────────────────────────────
